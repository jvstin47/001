<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>47 — Justin Joe Mathew</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --accent: #e8a1a1;
  --accent-soft: #f3caca;
  --glass: rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html { scroll-behavior: smooth; }

body {
  font-family: system-ui, sans-serif;
  background: #0d0a0a;
  color: #fff;
  overflow-x: hidden;
}

/* ================= NAV BAR ================= */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,5,5,.65);
  backdrop-filter: blur(6px);
  z-index: 1000;
}

nav .logo {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
}

nav ul {
  list-style: none;
  display: flex;
  gap: 30px;
}

nav ul li a {
  text-decoration: none;
  color: #fff;
  opacity: .85;
}

.menu-toggle {
  display: none;
  font-size: 1.8rem;
  cursor: pointer;
}

/* ================= HERO ================= */
.hero {
  min-height: 100vh;
  display: grid;
  place-items: center;
  text-align: center;
  background:
    linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
    url("images/bg.jpg") center/cover fixed;
  position: relative;
}

.hero h1 {
  font-size: clamp(3rem, 6vw, 5.5rem);
  color: var(--accent);
}

.hero p {
  font-size: 1.4rem;
  opacity: .85;
  margin-top: 15px;
}

/* ================= MORPHING SVG ================= */
.blob {
  position: absolute;
  width: 550px;
  opacity: .25;
  filter: blur(15px);
}

/* ================= SECTIONS ================= */
section {
  padding: 120px 10%;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 40px;
}

.card {
  background: var(--glass);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 40px;
}

/* ================= SKILLS ================= */
.skill {
  margin-bottom: 20px;
}

.bar {
  height: 8px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  background: var(--accent);
}

/* ================= GALLERY ================= */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 30px;
}

figure {
  background: var(--glass);
  border-radius: 15px;
  overflow: hidden;
}

figure img {
  width: 100%;
  display: block;
}

figcaption {
  padding: 12px;
  font-size: .9rem;
  opacity: .8;
}

/* ================= SOCIALS ================= */
.socials a {
  display: inline-block;
  margin-right: 20px;
  color: var(--accent-soft);
  text-decoration: none;
}

/* ================= FOOTER ================= */
footer {
  padding: 40px;
  text-align: center;
  opacity: .6;
}

/* ================= MOBILE ================= */
@media(max-width: 768px) {
  nav ul {
    position: absolute;
    top: 70px;
    right: 8%;
    flex-direction: column;
    background: rgba(0,0,0,.85);
    padding: 20px;
    display: none;
  }

  nav ul.show {
    display: flex;
  }

  .menu-toggle {
    display: block;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">47</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <ul id="menu">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- ================= HERO ================= -->
<div class="hero">
  <svg class="blob" viewBox="0 0 200 200">
    <path id="blobPath" fill="#e8a1a1"></path>
  </svg>

  <div>
    <h1 class="type">Justin Joe Mathew</h1>
    <p class="type">Computer Science Engineering Student</p>
  </div>
</div>

<!-- ================= ABOUT ================= -->
<section id="about">
  <div class="cards">
    <div class="card">
      Curious engineer who enjoys building things that look simple but
      have depth underneath.
    </div>
  </div>
</section>

<!-- ================= SKILLS ================= -->
<section id="skills">
  <div class="skill">
    HTML / CSS
    <div class="bar"><span style="width:80%"></span></div>
  </div>
  <div class="skill">
    JavaScript
    <div class="bar"><span style="width:65%"></span></div>
  </div>
</section>

<!-- ================= GALLERY ================= -->
<section id="gallery">
  <div class="gallery">
    <figure>
      <img src="images/img1.jpg">
      <figcaption>When: 2024 · Where: College · Why: First project</figcaption>
    </figure>
    <figure>
      <img src="images/img2.jpg">
      <figcaption>Late night build session</figcaption>
    </figure>
  </div>
</section>

<!-- ================= CONTACT ================= -->
<section id="contact">
  <div class="socials">
    <a href="#">Instagram</a>
    <a href="#">LinkedIn</a>
    <p>📧 jvstin47@gmail.com</p>
  </div>
</section>

<footer>
  © 2026 — 47
</footer>

<script>
/* Hamburger */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

/* Typewriter (no cursor) */
document.querySelectorAll(".type").forEach(el=>{
  const text = el.textContent;
  el.textContent = "";
  let i = 0;
  setInterval(()=>{
    if(i < text.length){
      el.textContent += text[i++];
    }
  }, 60);
});

/* SVG morph */
const shapes = [
"M43.8,-74.5C57.2,-67.1,68.5,-57.2,74.4,-44.8C80.3,-32.4,80.8,-16.2,79.6,-0.7C78.4,14.8,75.5,29.6,68.3,42.3C61.1,55,49.6,65.6,36.4,71.7C23.2,77.8,11.6,79.4,-1.7,82.3C-15,85.2,-30,89.4,-42.1,83.4C-54.2,77.4,-63.3,61.1,-70.3,45.6C-77.3,30.1,-82.2,15,-80.3,1.1C-78.3,-12.9,-69.6,-25.8,-60.3,-37.9C-51,-50,-41.2,-61.3,-29,-70.2C-16.8,-79.1,-8.4,-85.6,3.2,-90.5C14.8,-95.4,29.6,-98.7,43.8,-74.5Z",
"M36.7,-63.4C49.3,-56.2,62.2,-49.4,69.1,-38.7C76,-28,76.8,-14,75.6,-0.7C74.4,12.6,71.3,25.2,64.7,36.8C58.1,48.4,48,59,35.9,64.8C23.8,70.6,11.9,71.6,-1.2,73.7C-14.3,75.8,-28.6,79,-40.6,73.6C-52.6,68.2,-62.3,54.2,-68.7,39.8C-75.1,25.4,-78.2,12.7,-77.2,0.6C-76.2,-11.5,-71.2,-23,-63.4,-33.8C-55.6,-44.6,-44.9,-54.7,-32.9,-62.8C-20.9,-70.9,-10.4,-77,1.3,-79.2C13,-81.4,26,-79.7,36.7,-63.4Z"
];
let i=0;
setInterval(()=>{
  document.getElementById("blobPath").setAttribute("d",shapes[i++%2]);
},4000);
</script>

</body>
</html>
