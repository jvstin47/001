<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Justin Joe Mathew</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =====================
   THEME VARIABLES
===================== */
:root {
  --bg: #000;
  --fg: #fff;
  --glass: rgba(255,255,255,.08);
  --accent: #00f2ff;
}

body.light {
  --bg: #f4f6f8;
  --fg: #111;
  --glass: rgba(0,0,0,.08);
}

/* =====================
   BASE
===================== */
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  overflow-x: hidden;
}

/* =====================
   NAVBAR + HAMBURGER
===================== */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  backdrop-filter: blur(6px);
  background: var(--glass);
  z-index: 10;
}

.nav {
  max-width: 1200px;
  margin: auto;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu {
  display: none;
}

.links a {
  margin-left: 20px;
  color: var(--fg);
  text-decoration: none;
  opacity: .8;
}

.links a:hover { opacity:1; }

.hamburger {
  display: none;
  font-size: 1.5rem;
  cursor: pointer;
}

/* =====================
   HERO
===================== */
.hero {
  height: 100vh;
  display: grid;
  place-items: center;
  text-align: center;
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.9)),
    url("images/bg.jpg") center/cover fixed;
}

h1.type, h2.type, p.type {
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid var(--accent);
  animation: typing 2.5s steps(30), blink .7s infinite;
}

@keyframes typing { from { width:0 } to { width:100% } }
@keyframes blink { 50% { border-color: transparent; } }

/* =====================
   MORPHING SVG
===================== */
.blob {
  position:absolute;
  width:480px;
  opacity:.25;
  filter: blur(10px);
}

/* =====================
   SECTIONS
===================== */
section { padding:120px 10%; }

.card {
  background: var(--glass);
  backdrop-filter: blur(6px);
  padding:35px;
  border-radius:16px;
  margin-bottom:30px;
}

/* =====================
   SKILLS DASHBOARD
===================== */
.skill {
  margin-bottom:20px;
}

.bar {
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background: var(--accent);
  width:0;
  animation: fill 2s forwards;
}

@keyframes fill { to { width: var(--level); } }

/* =====================
   SOCIALS
===================== */
.socials a {
  margin-right:20px;
  font-size:1.2rem;
  color: var(--fg);
  text-decoration:none;
}

/* =====================
   MOBILE
===================== */
@media(max-width:768px){
  .links { display:none; }
  .hamburger { display:block; }
  .menu {
    display:none;
    flex-direction:column;
    background:var(--glass);
  }
  .menu a {
    padding:15px;
    text-decoration:none;
    color:var(--fg);
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav">
    <strong>Justin JM</strong>
    <div class="links">
      <a href="#skills">Skills</a>
      <a href="#socials">Socials</a>
      <a href="#" onclick="toggleTheme()">🌙</a>
    </div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>
  <div class="menu" id="menu">
    <a href="#skills">Skills</a>
    <a href="#socials">Socials</a>
  </div>
</nav>

<div class="hero">
  <svg class="blob" viewBox="0 0 200 200">
    <path id="blob" fill="#7d2ae8"></path>
  </svg>

  <div>
    <h1 class="type">Justin Joe Mathew</h1>
    <p class="type">Computer Science Engineering Student</p>
  </div>
</div>

<section id="skills">
  <h2 class="type">Skill Dashboard</h2>

  <div class="skill">
    <p>HTML / CSS</p>
    <div class="bar"><div class="fill" style="--level:85%"></div></div>
  </div>

  <div class="skill">
    <p>JavaScript</p>
    <div class="bar"><div class="fill" style="--level:70%"></div></div>
  </div>

  <div class="skill">
    <p>Problem Solving</p>
    <div class="bar"><div class="fill" style="--level:75%"></div></div>
  </div>
</section>

<section id="socials">
  <h2 class="type">Find Me</h2>
  <div class="socials">
    <a href="https://instagram.com/yourhandle" target="_blank">Instagram</a>
    <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
  </div>
</section>

</body>
</html>
